<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Maswer Attend – Scan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
:root{--brand:#F05A22;--dark:#1E2D4E;--border:#e2e4ea;--text:#1a1a2e;--muted:#7b8299;}
body{min-height:100vh;background:linear-gradient(160deg,#1E2D4E 0%,#253b6e 60%,#1a1a2e 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:24px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.35);}
.card-header{background:linear-gradient(135deg,#1E2D4E,#2d4a7a);padding:22px;text-align:center;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px;}
.logo-row .plus{font-size:24px;font-weight:900;color:var(--brand);}
.logo-row .name{font-size:20px;font-weight:700;color:#fff;}
.logo-row .tag{font-size:10px;background:var(--brand);color:#fff;border-radius:5px;padding:3px 7px;font-weight:700;}
.sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px;}
.form-body{padding:22px;}
.time-bar{background:linear-gradient(90deg,#EAF3DE,#f5faf0);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.time-bar .tbl{font-size:11px;color:#3B6D11;font-weight:600;}
.time-bar .tval{font-size:15px;font-weight:700;color:#3B6D11;}
.field{margin-bottom:14px;}
.field label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
.field .req{color:var(--brand);}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;outline:none;color:var(--text);transition:border 0.2s;}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(240,90,34,0.1);}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px;}
.shift-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.shift-btn{padding:10px 8px;border:2px solid var(--border);border-radius:10px;background:#f8f9fb;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all 0.15s;text-align:center;line-height:1.4;}
.shift-btn:hover{border-color:var(--brand);background:#fff8f5;}
.shift-btn.active{border-color:var(--brand);background:#FFF0EA;color:var(--brand);}
.shift-btn small{font-size:10px;font-weight:400;color:var(--muted);display:block;}
.shift-btn.active small{color:var(--brand);}
#statusBadge{display:none;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;}
#statusBadge.in-mode{background:#EAF3DE;color:#3B6D11;border:1.5px solid #b8dda0;}
#statusBadge.out-mode{background:#EAF0FB;color:#1E2D4E;border:1.5px solid #a5b4e8;}
#statusBadge.done-mode{background:#FFF3E6;color:#8B4000;border:1.5px solid #f5c896;}
#statusBadge.warn-mode{background:#FEECEC;color:#A32D2D;border:1.5px solid #f5a5a5;}
.loc-bar{background:#f0f2f5;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#7b8299;display:flex;align-items:center;gap:8px;}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;color:#fff;}
.submit-btn.in-btn{background:#F05A22;}
.submit-btn.in-btn:hover{background:#d44d1a;transform:translateY(-1px);}
.submit-btn.out-btn{background:#1E2D4E;}
.submit-btn.out-btn:hover{background:#162240;transform:translateY(-1px);}
.submit-btn:disabled{background:#ccc;cursor:not-allowed;transform:none;opacity:0.7;}
.err-msg{color:#e24b4a;font-size:12px;text-align:center;margin-top:10px;min-height:16px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(20,35,65,0.94);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
.overlay.show{display:flex;}
.thumb-emoji{font-size:90px;animation:thumbPop 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes thumbPop{0%{transform:scale(0) rotate(-30deg);opacity:0;}60%{transform:scale(1.25) rotate(8deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.confetti-row{display:flex;gap:8px;margin-top:10px;}
.ov-name{margin-top:18px;font-size:22px;font-weight:700;color:#fff;}
.ov-msg{margin-top:6px;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;}
.ov-time{margin-top:8px;font-size:13px;color:rgba(255,255,255,0.5);}
.ov-btn{margin-top:26px;padding:14px 32px;background:var(--brand);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.ov-back{margin-top:12px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;}
.ov-back:hover{color:rgba(255,255,255,0.7);}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-row">
      <span class="plus">+</span><span class="name">maswer</span><span class="tag">attend</span>
    </div>
    <div class="sub">Apni attendance darj karein</div>
  </div>
  <div class="form-body">
    <div class="time-bar">
      <span class="tbl">⏰ Abhi ka samay</span>
      <span class="tval" id="liveClock">--:-- --</span>
    </div>
 
    <div class="field">
      <label>EMP ID <span class="req">*</span></label>
      <input type="text" id="empId" placeholder="Jaise: MW001" autocomplete="off" autocapitalize="characters" oninput="onEmpIdChange()"/>
      <div class="hint">Admin ne diya hua EMP ID bharein</div>
    </div>
 
    <div class="field" id="shiftField" style="display:none;">
      <label>Apni Shift <span class="req">*</span></label>
      <div class="shift-grid">
        <button type="button" class="shift-btn" onclick="selectShift('A')" id="shift-A">🌅 A Shift<br><small>6:30 AM</small></button>
        <button type="button" class="shift-btn" onclick="selectShift('B')" id="shift-B">🌤️ B Shift<br><small>3:15 PM</small></button>
        <button type="button" class="shift-btn" onclick="selectShift('G')" id="shift-G">☀️ G Shift<br><small>8:45 AM</small></button>
        <button type="button" class="shift-btn" onclick="selectShift('C')" id="shift-C">🌙 C Shift<br><small>11:45 PM</small></button>
      </div>
    </div>
 
    <div id="statusBadge"></div>
 
    <div class="loc-bar" id="locationStatus">
      <span id="locIcon">📍</span>
      <span id="locText">Location check ho raha hai...</span>
    </div>
 
    <button class="submit-btn in-btn" id="mainBtn" onclick="smartSubmit()" disabled style="opacity:0.6;">
      ✓ Attendance Darj Karein
    </button>
    <div class="err-msg" id="errMsg"></div>
  </div>
</div>
 
<!-- PUNCH IN SUCCESS -->
<div class="overlay" id="punchInOverlay">
  <div class="thumb-emoji">👍</div>
  <div class="confetti-row"><span style="font-size:22px;">🎉</span><span style="font-size:22px;">✨</span><span style="font-size:22px;">🎊</span></div>
  <div class="ov-name" id="piName">—</div>
  <div class="ov-msg" id="piMsg">Punch In ho gaya!</div>
  <div class="ov-time" id="piTime">—</div>
  <button class="ov-btn" onclick="resetForm()">← Wapas</button>
</div>
 
<!-- PUNCH OUT SUCCESS -->
<div class="overlay" id="punchOutOverlay">
  <div style="font-size:80px;">👋</div>
  <div class="confetti-row"><span style="font-size:22px;">✅</span><span style="font-size:22px;">🏠</span><span style="font-size:22px;">✅</span></div>
  <div class="ov-name" id="poName">—</div>
  <div class="ov-msg">Punch Out ho gaya! Ghar jaiye aaram se 😊</div>
  <div class="ov-time" id="poTime">—</div>
  <button class="ov-btn" onclick="resetForm()">← Wapas</button>
</div>
 
<!-- NOT REGISTERED -->
<div class="overlay" id="notListedOverlay">
  <div style="font-size:70px;">🚫</div>
  <div class="ov-name" style="color:#FF6B6B;">Registered Nahi Hai</div>
  <div class="ov-msg"><span id="notListedId"></span> system mein nahi hai.<br/>Admin se contact karein.</div>
  <div class="ov-back" style="margin-top:30px;" onclick="document.getElementById('notListedOverlay').classList.remove('show');resetForm()">← Wapas</div>
</div>
 
<script>
let selectedShift = '';
let currentMode = 'punch_in';
let locationAllowed = false;
let locationChecked = false;
let statusCheckTimer = null;
 
// Live clock
function updateClock() {
  document.getElementById('liveClock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true, timeZone:'Asia/Kolkata' });
}
updateClock();
setInterval(updateClock, 1000);
 
// Check device session on load
async function checkDeviceSession() {
  try {
    const res = await fetch('/api/device-session');
    const data = await res.json();
    if (data.hasSession) {
      document.getElementById('empId').value = data.empId;
      document.getElementById('empId').readOnly = true;
      applyStatus({ status: 'punch_out', employee: { name: data.empName, id: data.empId }, record: data.record });
    }
  } catch(e) {}
}
 
function onEmpIdChange() {
  clearTimeout(statusCheckTimer);
  const empId = document.getElementById('empId').value.trim();
  if (empId.length < 2) { resetBadge(); return; }
  statusCheckTimer = setTimeout(() => checkStatus(empId), 600);
}
 
async function checkStatus(empId) {
  try {
    const res = await fetch('/api/status/' + encodeURIComponent(empId.toUpperCase()));
    const data = await res.json();
    applyStatus(data);
  } catch(e) { applyStatus({ status: 'punch_in' }); }
}
 
function applyStatus(data) {
  const badge = document.getElementById('statusBadge');
  const shiftField = document.getElementById('shiftField');
  badge.style.display = 'block';
 
  if (data.status === 'not_registered') {
    badge.className = 'done-mode';
    badge.innerHTML = '⚠️ Yeh EMP ID registered nahi hai<br><small style="font-weight:400;font-size:11px;">Admin se confirm karein</small>';
    setButtonIn(); currentMode = 'punch_in';
    shiftField.style.display = 'block';
 
  } else if (data.status === 'punch_in') {
    badge.className = 'in-mode';
    badge.innerHTML = `🟢 ${data.employee?.name || ''} — Aaj check-in nahi kiya<br><small style="font-weight:400;font-size:11px;">Shift select karke Punch In karein</small>`;
    setButtonIn(); currentMode = 'punch_in';
    shiftField.style.display = 'block';
 
  } else if (data.status === 'punch_out') {
    badge.className = 'out-mode';
    badge.innerHTML = `🔵 ${data.employee?.name || ''} — Check-in: ${data.record?.time || ''} (${data.record?.shift || ''})<br><small style="font-weight:400;font-size:11px;">Punch Out karein</small>`;
    setButtonOut(); currentMode = 'punch_out';
    shiftField.style.display = 'none';
 
  } else if (data.status === 'different_device') {
    badge.className = 'warn-mode';
    badge.innerHTML = `⚠️ ${data.employee?.name || ''} ki attendance kisi aur phone se mark hui hai<br><small style="font-weight:400;font-size:11px;">Punch out usi phone se karein</small>`;
    const btn = document.getElementById('mainBtn');
    btn.disabled = true; btn.style.opacity = '0.5';
    currentMode = 'blocked';
    shiftField.style.display = 'none';
 
  } else if (data.status === 'already_out') {
    badge.className = 'done-mode';
    badge.innerHTML = `✅ ${data.employee?.name || ''} — Aaj ka kaam khatam<br><small style="font-weight:400;font-size:11px;">Kal aane par wapas Punch In kar sakte hain</small>`;
    const btn = document.getElementById('mainBtn');
    btn.disabled = true; btn.style.opacity = '0.5';
    btn.className = 'submit-btn in-btn';
    btn.innerHTML = '✅ Aaj ka kaam khatam';
    currentMode = 'already_out';
    shiftField.style.display = 'none';
  }
}
 
function setButtonIn() {
  const btn = document.getElementById('mainBtn');
  btn.className = 'submit-btn in-btn';
  btn.innerHTML = '🟢 Punch In – Attendance Darj Karein';
  if (locationAllowed) { btn.disabled = false; btn.style.opacity = '1'; }
}
function setButtonOut() {
  const btn = document.getElementById('mainBtn');
  btn.className = 'submit-btn out-btn';
  btn.innerHTML = '🔵 Punch Out – Check-Out Karein';
  if (locationAllowed) { btn.disabled = false; btn.style.opacity = '1'; }
}
function resetBadge() {
  document.getElementById('statusBadge').style.display = 'none';
  document.getElementById('shiftField').style.display = 'none';
  setButtonIn(); currentMode = 'punch_in';
}
 
function selectShift(shift) {
  selectedShift = shift;
  document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('shift-' + shift).classList.add('active');
}
 
async function smartSubmit() {
  if (currentMode === 'punch_out') await doPunchOut();
  else if (currentMode === 'punch_in') await doPunchIn();
}
 
async function doPunchIn() {
  const empId = document.getElementById('empId').value.trim().toUpperCase();
  const errEl = document.getElementById('errMsg');
  const btn = document.getElementById('mainBtn');
  if (!empId) { errEl.textContent = '❌ EMP ID zaroori hai.'; return; }
  if (!selectedShift) { errEl.textContent = '❌ Pehle apni shift select karein!'; return; }
  if (!locationAllowed) { errEl.textContent = '🚫 Location allow karein — attendance tab hi lagegi!'; return; }
 
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Mark ho raha hai...';
  errEl.textContent = '';
 
  try {
    const res = await fetch('/api/attendance', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ empId, shift: selectedShift })
    });
    const data = await res.json();
 
    if (res.status === 403 && data.error === 'not_listed') {
      document.getElementById('notListedId').textContent = empId;
      document.getElementById('notListedOverlay').classList.add('show');
      btn.disabled = false; setButtonIn(); return;
    }
    if (res.status === 409 && data.error === 'device_busy') {
      errEl.textContent = '❌ ' + data.message;
      btn.disabled = false; setButtonIn(); return;
    }
    if (!res.ok) {
      errEl.textContent = '❌ ' + (data.error || 'Kuch galat hua');
      btn.disabled = false; setButtonIn(); return;
    }
 
    const rec = data.record;
    document.getElementById('piName').textContent = data.employee.name;
    document.getElementById('piMsg').textContent = rec.status === 'late'
      ? `${rec.shift} Shift — Aap thoda late aaye! ⚠️`
      : `${rec.shift} Shift — Aap time pe hain! 👏`;
    document.getElementById('piTime').textContent = `Punch In: ${rec.time} · ${rec.status === 'late' ? 'Late' : 'Present ✅'}`;
    document.getElementById('punchInOverlay').classList.add('show');
 
  } catch(e) {
    errEl.textContent = '❌ Server se connect nahi ho saka.';
    btn.disabled = false; setButtonIn();
  }
}
 
async function doPunchOut() {
  const empId = document.getElementById('empId').value.trim().toUpperCase();
  const errEl = document.getElementById('errMsg');
  const btn = document.getElementById('mainBtn');
  if (!empId) { errEl.textContent = '❌ EMP ID zaroori hai.'; return; }
 
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Check-out ho raha hai...';
  errEl.textContent = '';
 
  try {
    const res = await fetch('/api/checkout', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ empId })
    });
    const data = await res.json();
 
    if (res.status === 403 && data.error === 'wrong_device') {
      errEl.textContent = '❌ ' + data.message;
      btn.disabled = false; setButtonOut(); return;
    }
    if (!res.ok) {
      errEl.textContent = '❌ ' + (data.message || data.error);
      btn.disabled = false; setButtonOut(); return;
    }
 
    document.getElementById('poName').textContent = data.employee.name;
    document.getElementById('poTime').textContent = `Check-out: ${data.record.checkOut} · Kaam: ${data.record.totalHours}`;
    document.getElementById('punchOutOverlay').classList.add('show');
 
  } catch(e) {
    errEl.textContent = '❌ Server se connect nahi ho saka.';
    btn.disabled = false; setButtonOut();
  }
}
 
function resetForm() {
  document.getElementById('punchInOverlay').classList.remove('show');
  document.getElementById('punchOutOverlay').classList.remove('show');
  const empInput = document.getElementById('empId');
  empInput.value = ''; empInput.readOnly = false;
  document.getElementById('errMsg').textContent = '';
  document.getElementById('shiftField').style.display = 'none';
  document.getElementById('statusBadge').style.display = 'none';
  selectedShift = '';
  document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
  setButtonIn();
  empInput.focus();
}
 
document.getElementById('empId').addEventListener('keydown', e => {
  if (e.key === 'Enter') smartSubmit();
});
 
// ── LOCATION ──────────────────────────────────────────────
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
 
async function checkLocation() {
  const locIcon = document.getElementById('locIcon');
  const locText = document.getElementById('locText');
  const locBar = document.getElementById('locationStatus');
  const btn = document.getElementById('mainBtn');
 
  // Check if location is set on server
  let locData = {};
  try {
    const r = await fetch('/api/location');
    locData = await r.json();
  } catch(e) {}
 
  // If no location set — allow attendance
  if (!locData.lat || !locData.lng) {
    locIcon.textContent = '✅';
    locText.textContent = 'Location check nahi hai (admin ne set nahi ki)';
    locBar.style.background = '#EAF3DE';
    locText.style.color = '#3B6D11';
    locationAllowed = true;
    if (currentMode !== 'already_out' && currentMode !== 'blocked') {
      btn.disabled = false; btn.style.opacity = '1';
    }
    return;
  }
 
  // Location is set — GPS check mandatory
  if (!navigator.geolocation) {
    locIcon.textContent = '🚫';
    locText.textContent = 'GPS support nahi hai — attendance nahi lag sakti!';
    locBar.style.background = '#FCEBEB';
    locText.style.color = '#A32D2D';
    locationAllowed = false;
    return;
  }
 
  locText.textContent = 'GPS location check ho rahi hai...';
 
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const dist = getDistance(pos.coords.latitude, pos.coords.longitude, locData.lat, locData.lng);
    const radius = locData.radius || 100;
 
    if (dist <= radius) {
      locIcon.textContent = '✅';
      locText.textContent = `${locData.name || 'Office'} mein hain (${Math.round(dist)}m)`;
      locBar.style.background = '#EAF3DE';
      locText.style.color = '#3B6D11';
      locationAllowed = true;
      if (currentMode !== 'already_out' && currentMode !== 'blocked') {
        btn.disabled = false; btn.style.opacity = '1';
      }
    } else {
      locIcon.textContent = '🚫';
      locText.textContent = `Aap ${locData.name || 'office'} se ${Math.round(dist)}m door hain! Attendance nahi lagi.`;
      locBar.style.background = '#FCEBEB';
      locText.style.color = '#A32D2D';
      locationAllowed = false;
      btn.disabled = true; btn.style.opacity = '0.5';
    }
  }, (err) => {
    locIcon.textContent = '🚫';
    locText.textContent = 'GPS access denied — location allow karein!';
    locBar.style.background = '#FCEBEB';
    locText.style.color = '#A32D2D';
    locationAllowed = false;
    btn.disabled = true; btn.style.opacity = '0.5';
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}
 
// Init
checkLocation();
checkDeviceSession();
</script>
</body>
</html>
